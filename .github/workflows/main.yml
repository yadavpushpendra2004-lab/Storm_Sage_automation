name: Storm Sage Cloud Uploader

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein check karega

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Reconstruct Token
        run: |
          echo "${{ secrets.YT_TOKEN_PICKLE }}" > token.pickle

      - name: Run Uploader
        run: python uploader.py